spec_version: 1
name: incident-rca-env
type: space
runtime: fastapi
app: server.app:app 
port: 7860
version: "1.0.0"
description: >
  Reinforcement learning environment for training AI agents to perform
  incident response and root cause analysis on production microservice systems.
  Agents diagnose cascading failures from logs, metrics, traces, and service maps.

author: "Srujan Gowda"
tags:
  - openenv
  - devops
  - incident-response
  - root-cause-analysis
  - agentic-rl
  - real-world

#API Compliance
api:
  reset: "Returns ObservationModel with initial incident state"
  step: "Accepts ActionModel, returns (ObservationModel, RewardModel, bool, InfoModel)"
  state: "Returns full internal state dict for debugging"

# Observation Space
observation_space:
  type: structured_dict
  fields:
    step:
      type: int
      description: "Current step number (0-indexed)"
    max_steps:
      type: int
      description: "Maximum steps allowed for this task"
    task_id:
      type: str
      description: "Task identifier (e.g. easy_001)"
    task_description:
      type: str
      description: "Full incident brief for the agent"
    alerts:
      type: array
      items: dict
      description: "Active PagerDuty-style alerts with id, service, severity, message, time"
    tool_result:
      type: dict
      nullable: true
      description: "Result of the last tool call (null if no tool called yet)"
    history:
      type: array
      items: dict
      description: "Last 5 action logs with action, parameters, result, reward"
    available_actions:
      type: array
      items: str
      description: "Valid action_type strings the agent can use"
    done:
      type: bool
      description: "Whether the episode has ended"
    reward:
      type: float
      description: "The reward received at the current step"
    metadata:
      type: dict
      description: "Additional debugging or tracking information"

# Action Space
action_space:
  type: structured_dict
  fields:
    action_type:
      type: str
      enum:
        - grep_logs
        - query_metrics
        - fetch_traces
        - query_dependencies
        - submit_diagnosis
    parameters:
      type: dict
      description: "Action-specific parameters (see per-action schemas below)"

action_schemas:
  grep_logs:
    service:
      type: str
      required: true
      description: "Service name to search logs for"
    keyword:
      type: str
      required: false
      description: "Keyword to filter log messages (empty = return all logs for service)"

  query_metrics:
    service:
      type: str
      required: true
      description: "Service name to query metrics for"
    metric_name:
      type: str
      required: true
      description: "Metric name to retrieve (e.g. cpu_usage, memory_usage_mb, error_rate)"

  fetch_traces:
    request_id:
      type: str
      required: true
      description: "Trace/request ID to retrieve (visible in alerts or tool results)"

  query_dependencies:
    service:
      type: str
      required: true
      description: "Service name to look up upstream and downstream dependencies"

  submit_diagnosis:
    root_cause_service:
      type: str
      required: true
      description: "Service identified as the root cause"
    cause_type:
      type: str
      required: true
      description: "Short description of the failure mode (e.g. connection pool exhausted)"

# Reward Space 
reward_space:
  type: float
  range: [-0.60, 0.90]
  shape: partial_multi_step
  description: >
    Step-wise deterministic rewards. Intermediate rewards guide the agent
    toward the correct investigation path. Terminal reward is given only at
    submit_diagnosis.
  reward_table:
    submit_diagnosis_perfect: +0.90   # exact service + cause match
    submit_diagnosis_partial: +0.50   # correct service, wrong cause
    submit_diagnosis_wrong:   -0.50   # wrong service
    grep_logs_relevant:       +0.05   # service is in the failure cascade
    query_metrics_relevant:   +0.05   # service is in the failure cascade
    fetch_traces_implicates:  +0.10   # trace implicates the root cause service
    query_dependencies_toward: +0.05  # queried service is in the failure cascade
    repeated_action:          -0.10   # exact same tool call made twice
    invalid_action:           -0.10   # missing required parameter or unknown service
    step_penalty:             -0.01   # applied every step (efficiency incentive)

# Tasks 
tasks:
  - id: easy_001
    difficulty: easy
    description: DB connection pool exhaustion

  - id: medium_001
    difficulty: medium
    description: Slow query cascade

  - id: hard_001
    difficulty: hard
    description: Redis split-brain

# Non-functional 
deployment:
  containerized: true
  dockerfile: Dockerfile
  huggingface_space: true
  cpu_only: true
  memory_limit: "2GB"

documentation:
  readme: README.md
  baseline_scores: baseline_scores.json
