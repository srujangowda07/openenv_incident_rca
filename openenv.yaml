spec_version: 1
name: incident-rca-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
tasks:
- id: easy_001
  name: Postgres Pool Exhaustion
  difficulty: easy
  description: API Gateway 502 errors caused by postgres connection pool exhaustion.
  grader: graders.grader:EasyGrader
- id: easy_002
  name: Payment Service OOM
  difficulty: easy
  description: payment-service pods crashing due to memory leak in unbounded cache.
  grader: graders.grader:EasyGrader
- id: easy_003
  name: Logging Disk Full
  difficulty: easy
  description: logging-service down because disk full and log rotation disabled.
  grader: graders.grader:EasyGrader
- id: easy_004
  name: Redis Corruption
  difficulty: easy
  description: Redis container crash loop causing cache failures due to file corruption.
  grader: graders.grader:EasyGrader
- id: easy_005
  name: Storage Node Capacity
  difficulty: easy
  description: storage-node-3 disk capacity 100% due to cleanup job failure.
  grader: graders.grader:EasyGrader
- id: easy_006
  name: Auth Service Port Mismatch
  difficulty: easy
  description: auth-service unreachable due to targetPort mismatch in k8s service.
  grader: graders.grader:EasyGrader
- id: easy_007
  name: Billing DB Auth Failure
  difficulty: easy
  description: billing-service DB authentication failure due to rotated password.
  grader: graders.grader:EasyGrader
- id: medium_001
  name: Missing DB Index
  difficulty: medium
  description: schema migration dropped DB index causing service latency cascade.
  grader: graders.grader:MediumGrader
- id: medium_002
  name: Heavy Load Pool Exhaustion
  difficulty: medium
  description: database connection pool exhaustion under sudden heavy traffic load.
  grader: graders.grader:MediumGrader
- id: medium_003
  name: Rec-Engine Memory Leak
  difficulty: medium
  description: steady heap growth in recommendation engine causing degradation.
  grader: graders.grader:MediumGrader
- id: medium_004
  name: Gateway TLS Expiry
  difficulty: medium
  description: api-gateway TLS certificate expired causing handshake failures.
  grader: graders.grader:MediumGrader
- id: medium_005
  name: Internal Proxy DNS Failure
  difficulty: medium
  description: internal-proxy DNS resolution failure due to CoreDNS corruption.
  grader: graders.grader:MediumGrader
- id: hard_001
  name: Redis Split-Brain
  difficulty: hard
  description: Redis cluster split-brain caused by network partition in rack-A.
  grader: graders.grader:HardGrader
- id: hard_002
  name: MySQL Index Corruption
  difficulty: hard
  description: InnoDB index corruption causing data inconsistency in report-svc.
  grader: graders.grader:HardGrader
- id: hard_003
  name: Etcd Split-Brain
  difficulty: hard
  description: distributed etcd split-brain due to network partition.
  grader: graders.grader:HardGrader
- id: hard_004
  name: Mesh Config Drift
  difficulty: hard
  description: Istio configuration drift causing routing inconsistency in k8s-mesh.
  grader: graders.grader:HardGrader
- id: hard_005
  name: Global Rate Limiter Overflow
  difficulty: hard
  description: global-throttle-service dropping valid traffic due to overflow error.
  grader: graders.grader:HardGrader
version: 1.0.0
observation_space:
  type: json
action_space:
  type: json
  fields:
    action_type:
      type: string
      enum:
      - grep_logs
      - query_metrics
      - fetch_traces
      - query_dependencies
      - submit_diagnosis
reward_space:
  type: float
