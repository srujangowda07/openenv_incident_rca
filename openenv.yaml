spec_version: 1
name: incident-rca-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
tasks:
- id: easy_001
  name: Postgres Pool Exhaustion
  difficulty: easy
  description: API Gateway 502 errors caused by postgres connection pool exhaustion.
  grader:
    type: llm
    prompt_template: "Evaluate the agent diagnosis for incident easy_001. Ground Truth Solution: service='postgres-primary', cause='connection pool exhausted'. Scoring Logic: If root_cause_service is 'postgres-primary' AND cause_type is 'connection pool exhausted', score 0.95. If service matches but cause is wrong, score 0.70. If service is mentioned in logs/traces but diagnostic is wrong, score 0.30. Otherwise, score 0.05. Output ONLY a float between 0 and 1."
- id: easy_002
  name: Payment Service OOM
  difficulty: easy
  description: payment-service pods crashing due to memory leak in unbounded cache.
  grader:
    type: llm
    prompt_template: "Evaluate the agent diagnosis for incident easy_002. Ground Truth Solution: service='payment-service', cause='memory leak OOMKilled'. Scoring Logic: If root_cause_service is 'payment-service' AND cause_type is 'memory leak OOMKilled', score 0.95. If service matches but cause is wrong, score 0.70. If service is mentioned in logs/traces but diagnostic is wrong, score 0.30. Otherwise, score 0.05. Output ONLY a float between 0 and 1."
