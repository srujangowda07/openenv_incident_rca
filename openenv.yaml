# openenv.yaml — OpenEnv Spec Compliance File
# Validated with: python validate.py

spec_version: 1
name: incident-rca-env
version: "1.0.0"
description: >
  Reinforcement learning environment for training AI agents to perform
  incident response and root cause analysis on production microservice systems.
  Agents diagnose cascading failures from logs, metrics, traces, and service maps.

author: "Srujan Gowda"
tags:
  - openenv
  - devops
  - incident-response
  - root-cause-analysis
  - agentic-rl
  - real-world

#API Compliance
api:
  reset: "Returns ObservationModel with initial incident state"
  step: "Accepts ActionModel, returns (ObservationModel, RewardModel, bool, InfoModel)"
  state: "Returns full internal state dict for debugging"

# Observation Space
observation_space:
  type: structured_dict
  fields:
    step:
      type: int
      description: "Current step number (0-indexed)"
    max_steps:
      type: int
      description: "Maximum steps allowed for this task"
    task_id:
      type: str
      description: "Task identifier (e.g. easy_001)"
    task_description:
      type: str
      description: "Full incident brief for the agent"
    alerts:
      type: array
      items: dict
      description: "Active PagerDuty-style alerts with id, service, severity, message, time"
    tool_result:
      type: dict
      nullable: true
      description: "Result of the last tool call (null if no tool called yet)"
    history:
      type: array
      items: dict
      description: "Last 5 action logs with action, parameters, result, reward"
    available_actions:
      type: array
      items: str
      description: "Valid action_type strings the agent can use"
    done:
      type: bool
      description: "Whether the episode has ended"
    reward:
      type: float
      description: "The reward received at the current step"
    metadata:
      type: dict
      description: "Additional debugging or tracking information"

# Action Space
action_space:
  type: structured_dict
  fields:
    action_type:
      type: str
      enum:
        - grep_logs
        - query_metrics
        - fetch_traces
        - query_dependencies
        - submit_diagnosis
    parameters:
      type: dict
      description: "Action-specific parameters (see per-action schemas below)"

action_schemas:
  grep_logs:
    service:
      type: str
      required: true
      description: "Service name to search logs for"
    keyword:
      type: str
      required: false
      description: "Keyword to filter log messages (empty = return all logs for service)"

  query_metrics:
    service:
      type: str
      required: true
      description: "Service name to query metrics for"
    metric_name:
      type: str
      required: true
      description: "Metric name to retrieve (e.g. cpu_usage, memory_usage_mb, error_rate)"

  fetch_traces:
    request_id:
      type: str
      required: true
      description: "Trace/request ID to retrieve (visible in alerts or tool results)"

  query_dependencies:
    service:
      type: str
      required: true
      description: "Service name to look up upstream and downstream dependencies"

  submit_diagnosis:
    root_cause_service:
      type: str
      required: true
      description: "Service identified as the root cause"
    cause_type:
      type: str
      required: true
      description: "Short description of the failure mode (e.g. connection pool exhausted)"

# Reward Space 
reward_space:
  type: float
  range: [-0.60, 0.90]
  shape: partial_multi_step
  description: >
    Step-wise deterministic rewards. Intermediate rewards guide the agent
    toward the correct investigation path. Terminal reward is given only at
    submit_diagnosis.
  reward_table:
    submit_diagnosis_perfect: +0.90   # exact service + cause match
    submit_diagnosis_partial: +0.50   # correct service, wrong cause
    submit_diagnosis_wrong:   -0.50   # wrong service
    grep_logs_relevant:       +0.05   # service is in the failure cascade
    query_metrics_relevant:   +0.05   # service is in the failure cascade
    fetch_traces_implicates:  +0.10   # trace implicates the root cause service
    query_dependencies_toward: +0.05  # queried service is in the failure cascade
    repeated_action:          -0.10   # exact same tool call made twice
    invalid_action:           -0.10   # missing required parameter or unknown service
    step_penalty:             -0.01   # applied every step (efficiency incentive)

# Tasks 
tasks:
  - id: easy_001
    grader: "graders.grader:grade"
    name: "DB Connection Pool Exhaustion"
    difficulty: easy
    max_steps: 15
    description: "api-gateway 502 errors caused by postgres connection pool exhaustion"

  - id: easy_002
    grader: "graders.grader:grade"
    name: "Payment Service OOMKilled"
    difficulty: easy
    max_steps: 15
    description: "payment-service pods crashing due to memory leak in unbounded cache"

  - id: easy_003
    grader: "graders.grader:grade"
    name: "Disk Full — Logging Service"
    difficulty: easy
    max_steps: 15
    description: "logging-service down because disk full and log rotation disabled"

  - id: easy_004
    grader: "graders.grader:grade"
    name: "Redis Crash Loop"
    difficulty: easy
    max_steps: 15
    description: "Redis container crash loop causing cache failures"

  - id: easy_005
    grader: "graders.grader:grade"
    name: "Storage Node Disk Full"
    difficulty: easy
    max_steps: 15
    description: "storage-node-3 disk capacity 100% due to cleanup job failure"

  - id: easy_006
    grader: "graders.grader:grade"
    name: "Port Misconfiguration"
    difficulty: easy
    max_steps: 15
    description: "auth-service unreachable due to targetPort mismatch in k8s service"

  - id: easy_007
    grader: "graders.grader:grade"
    name: "DB Credentials failure"
    difficulty: easy
    max_steps: 15
    description: "billing-service DB authentication failure due to rotated password"

  - id: medium_001
    grader: "graders.grader:grade"
    name: "Slow Query Cascade — Missing Index"
    difficulty: medium
    max_steps: 25
    description: "Schema migration dropped DB index causing 2-service cascade"

  - id: medium_002
    grader: "graders.grader:grade"
    name: "Connection Pool Exhaustion"
    difficulty: medium
    max_steps: 25
    description: "Database connection pool exhaustion under heavy load"

  - id: medium_003
    grader: "graders.grader:grade"
    name: "Memory Leak"
    difficulty: medium
    max_steps: 25
    description: "Steady heap growth in recommendation-engine leading to degradation"

  - id: medium_004
    grader: "graders.grader:grade"
    name: "TLS Certificate Expiry"
    difficulty: medium
    max_steps: 25
    description: "api-gateway TLS certificate expired causing handshake failures"

  - id: medium_005
    grader: "graders.grader:grade"
    name: "DNS Misconfiguration"
    difficulty: medium
    max_steps: 25
    description: "internal-proxy DNS resolution failure due to CoreDNS corruption"

  - id: hard_001
    grader: "graders.grader:grade"
    name: "Redis Cluster Split-Brain"
    difficulty: hard
    max_steps: 40
    description: "Network partition caused Redis split-brain affecting 6 dependent services"

  - id: hard_002
    grader: "graders.grader:grade"
    name: "Index Corruption"
    difficulty: hard
    max_steps: 40
    description: "Innodb index corruption causing data parity failure in report-svc"

  - id: hard_003
    grader: "graders.grader:grade"
    name: "Distributed Split-Brain"
    difficulty: hard
    max_steps: 40
    description: "Network partition causes split-brain in distributed Etcd cluster"

  - id: hard_004
    grader: "graders.grader:grade"
    name: "Config Drift"
    difficulty: hard
    max_steps: 40
    description: "Inconsistent mesh routing due to Istio configuration drift"

  - id: hard_005
    grader: "graders.grader:grade"
    name: "Rate Limiter Failure"
    difficulty: hard
    max_steps: 40
    description: "Global throttle-service dropping valid traffic due to overflow error"

# Graders collection
graders:
  rca_grader:
    type: custom
    entrypoint: "graders.grader:grade"
    score_range: [0.10, 0.90]
    pass_threshold: 0.60
    dimensions:
      - name: root_cause_service
        weight: 0.50
        description: "Exact match on root cause service name"
      - name: cause_type
        weight: 0.30
        description: "Exact match on cause type"
      - name: tool_evidence
        weight: 0.20
        description: "Agent queried root cause service"
      - name: penalties
        weight: variable
        description: "Deductions for invalid actions and wrong diagnosis"

# Grader configuration (Backwards compatibility)
grader:
  type: deterministic
  score_range: [0.10, 0.90]
  pass_threshold: 0.60
  dimensions:
    - name: root_cause_service
      weight: 0.50
    - name: cause_type
      weight: 0.30
    - name: tool_evidence
      weight: 0.20
    - name: penalties
      weight: variable

# Non-functional 
deployment:
  containerized: true
  dockerfile: Dockerfile
  huggingface_space: true
  cpu_only: true
  memory_limit: "2GB"

documentation:
  readme: README.md
  baseline_scores: baseline_scores.json
